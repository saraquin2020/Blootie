{% extends 'base.html' %}
{% load static %}

{% block content %}
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght=700;900&display=swap" rel="stylesheet">

<style>
    /* 1. FONDO ESTANDARIZADO DEL SISTEMA */
    .game-body {
        min-height: 100vh;
        background-color: #F7F9FC;
        background-image: radial-gradient(#E2E8F0 2px, transparent 2px);
        background-size: 30px 30px;
        display: flex; flex-direction: column; align-items: center; padding: 40px 20px;
        font-family: 'Nunito', sans-serif;
        user-select: none;
    }

    /* Ocultar el mono estático (respetando tu regla original) */
    #blootie-world { display: none !important; }

    /* 2. CONTENEDOR PRINCIPAL */
    .game-container {
        background: #FFFFFF;
        border-radius: 40px;
        padding: 50px 40px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        border: 4px solid #FFFFFF;
        max-width: 800px;
        width: 100%;
        text-align: center;
        position: relative;
    }

    /* 3. TIPOGRAFÍA Y TÍTULOS */
    .header-title {
        color: #374151; font-size: 3rem; font-weight: 900;
        margin-bottom: 40px; display: flex; align-items: center; justify-content: center; gap: 15px;
    }

    .title-icon { width: 50px; height: 50px; object-fit: contain; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }

    /* 4. ZONA DE FRUTAS (ASSETS 3D) */
    .fruit-zone {
        background: #F1F5F9;
        border: 4px dashed #CBD5E1;
        border-radius: 32px;
        min-height: 200px;
        display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 20px;
        padding: 30px; margin-bottom: 50px;
    }

    .fruta-item {
        width: 100px; height: 100px;
        object-fit: contain;
        filter: drop-shadow(0 10px 10px rgba(0,0,0,0.15));
        transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        cursor: pointer;
    }

    .fruta-item:hover { transform: scale(1.15) rotate(5deg); }

    /* 5. BOTONES DE NÚMEROS (BLOCK-PUSH UI) */
    .numbers-container {
        display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; margin-bottom: 30px;
    }

    .num-btn {
        width: 90px; height: 90px;
        font-size: 3rem; font-weight: 900; font-family: 'Nunito', sans-serif;
        border-radius: 24px; border: 2px solid #E5E7EB; border-bottom: 8px solid #E5E7EB;
        background: #FFFFFF; color: #1CB0F6;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; transition: all 0.1s ease; outline: none;
    }

    .num-btn:hover { background: #F9FAFB; transform: translateY(-2px); border-bottom-width: 10px; }
    .num-btn:active { transform: translateY(8px); border-bottom-width: 0px; margin-bottom: 8px; }

    /* Estados de Feedback en Botones */
    .num-btn.correct { background: #D7FFB8 !important; color: #58CC02 !important; border-color: #58CC02 !important; border-bottom-color: #58CC02 !important; }
    .num-btn.wrong { background: #FFEDED !important; color: #FF4B4B !important; border-color: #FF4B4B !important; border-bottom-color: #FF4B4B !important; animation: shake 0.4s ease-in-out; }

    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-10px) rotate(-5deg); }
        75% { transform: translateX(10px) rotate(5deg); }
    }

    /* Feedback Text */
    #feedback-text { font-size: 2.2rem; font-weight: 900; height: 50px; text-transform: uppercase; letter-spacing: 1px; }

    /* 6. BOTÓN ESTÁNDAR SECUNDARIO (VOLVER) */
    .btn-secondary {
        margin-top: 30px; background: #FF4B4B; color: white;
        font-size: 1.6rem; font-weight: 900; text-transform: uppercase;
        padding: 15px 50px; border-radius: 20px; text-decoration: none;
        border: none; border-bottom: 6px solid #EA2B2B; transition: all 0.1s; display: inline-block;
    }
    .btn-secondary:active { transform: translateY(6px); border-bottom-width: 0; }

    /* Feedback de Blootie */
    #blootie-feedback {
        position: fixed; bottom: -100px; right: 30px; width: 140px; z-index: 100;
        transition: bottom 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    #blootie-feedback.show { bottom: 20px; }

    /* Animaciones Generales */
    @keyframes bounceIn {
        0% { transform: scale(0); }
        50% { transform: scale(1.1); }
        100% { transform: scale(1); }
    }
    .animate-bounce { animation: bounceIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
</style>

<div class="game-body">
    <div class="game-container animate-bounce">
        
        <h2 class="header-title" id="game-title">
            <img src="" id="title-icon" class="title-icon" style="display:none;">
            ¿Cuántas <span id="fruit-name-text">...</span> hay?
        </h2>
        
        <div id="fruit-zone" class="fruit-zone">
        </div>

        <div class="numbers-container">
            {% for i in "12345" %}
                <button class="num-btn" onclick="checkAnswer({{ i }}, this)">{{ i }}</button>
            {% endfor %}
        </div>

        <div id="feedback-text"></div>
    </div>

    <div class="text-center mt-4">
        <a href="{% url 'student_dashboard' %}" class="btn-secondary">Volver al Inicio</a>
    </div>
</div>

<div id="blootie-feedback">
    <img src="{% static 'img/logo_blootie.png' %}" alt="Blootie" style="width:100%; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.2));">
</div>

<script>
    // ASSETS 3D DE FLUENT UI
    const fruits = [
        { img: 'https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Red%20apple/3D/red_apple_3d.png', name: 'manzanas' },
        { img: 'https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Banana/3D/banana_3d.png', name: 'bananas' },
        { img: 'https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Grapes/3D/grapes_3d.png', name: 'uvas' },
        { img: 'https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Strawberry/3D/strawberry_3d.png', name: 'fresas' },
        { img: 'https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Tangerine/3D/tangerine_3d.png', name: 'naranjas' },
        { img: 'https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Watermelon/3D/watermelon_3d.png', name: 'sandías' }
    ];

    let currentCount = 0;
    let isWaiting = false;

    // SINTETIZADOR DE EFECTOS DE SONIDO (Web Audio API)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(type) {
        // Asegurar que el contexto de audio esté activo (exigencia del navegador)
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }

        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        const now = audioCtx.currentTime;

        if (type === 'click') {
            // Sonido corto tipo "Pop"
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.exponentialRampToValueAtTime(1200, now + 0.08);
            gainNode.gain.setValueAtTime(0.15, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
            osc.start(now);
            osc.stop(now + 0.08);
        } else if (type === 'correct') {
            // Acorde alegre y ascendente
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(523.25, now); // Nota C5
            osc.frequency.setValueAtTime(659.25, now + 0.1); // Nota E5
            osc.frequency.setValueAtTime(783.99, now + 0.2); // Nota G5
            osc.frequency.exponentialRampToValueAtTime(1046.50, now + 0.4); // Nota C6
            gainNode.gain.setValueAtTime(0.2, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
            osc.start(now);
            osc.stop(now + 0.5);
        } else if (type === 'wrong') {
            // Tono grave descendente
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(220, now); // Nota A3
            osc.frequency.linearRampToValueAtTime(110, now + 0.3); // Nota A2
            gainNode.gain.setValueAtTime(0.15, now);
            gainNode.gain.linearRampToValueAtTime(0.01, now + 0.3);
            osc.start(now);
            osc.stop(now + 0.3);
        }
    }

    function setup() {
        isWaiting = false;
        const fruit = fruits[Math.floor(Math.random() * fruits.length)];
        currentCount = Math.floor(Math.random() * 5) + 1; // Número aleatorio del 1 al 5
        
        // Actualizar título con la imagen 3D en pequeño y el texto
        const titleIcon = document.getElementById('title-icon');
        titleIcon.src = fruit.img;
        titleIcon.style.display = 'inline-block';
        document.getElementById('fruit-name-text').innerText = fruit.name;
        
        // Limpiar y llenar zona de frutas con imágenes 3D animadas
        const zone = document.getElementById('fruit-zone');
        zone.innerHTML = "";
        
        for(let i=0; i < currentCount; i++) {
            const img = document.createElement('img');
            img.src = fruit.img;
            img.className = "fruta-item animate-bounce";
            img.style.opacity = "0"; // Inicia oculto para la animación
            img.style.animationDelay = (i * 0.15) + "s";
            
            // Forzar opacidad a 1 al iniciar la animación
            setTimeout(() => { img.style.opacity = "1"; }, (i * 150));
            
            zone.appendChild(img);
        }

        // Limpiar textos y estilos
        document.getElementById('feedback-text').innerText = "";
        document.getElementById('blootie-feedback').classList.remove('show');
        
        // Resetear botones
        document.querySelectorAll('.num-btn').forEach(btn => {
            btn.classList.remove('correct', 'wrong');
            btn.disabled = false; // Rehabilitar clics
        });
    }

    function checkAnswer(n, element) {
        if (isWaiting) return;

        if (n === currentCount) {
            isWaiting = true;
            element.classList.add('correct');
            playSound('correct'); // Sonido de Victoria
            
            const feedbackBox = document.getElementById('feedback-text');
            feedbackBox.innerText = "¡Excelente! ✨";
            feedbackBox.style.color = "#58CC02";
            
            document.getElementById('blootie-feedback').classList.add('show');
            
            // Deshabilitar el resto de botones para evitar clics dobles
            document.querySelectorAll('.num-btn').forEach(btn => btn.disabled = true);

            // Celebración
            confetti({
                particleCount: 150,
                spread: 80,
                origin: { y: 0.6 },
                colors: ['#58CC02', '#1CB0F6', '#FFC800']
            });

            setTimeout(setup, 2000); // 2 segundos para disfrutar la victoria antes de reiniciar
        } else {
            element.classList.add('wrong');
            playSound('wrong'); // Sonido de Error
            
            const feedbackBox = document.getElementById('feedback-text');
            feedbackBox.innerText = "¡Intenta de nuevo!";
            feedbackBox.style.color = "#FF4B4B";
            
            setTimeout(() => {
                element.classList.remove('wrong');
                if(!isWaiting) feedbackBox.innerText = ""; // Limpiar texto si no ha ganado aún
            }, 800);
        }
    }

    // Iniciar juego al cargar la página
    document.addEventListener('DOMContentLoaded', setup);
</script>
{% endblock %}
