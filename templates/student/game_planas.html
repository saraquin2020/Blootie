{% extends 'base.html' %}
{% load static %}

{% block content %}
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Recursive:wght@900&display=swap" rel="stylesheet">

<style>
    /* 1. FONDO ESTANDARIZADO */
    .game-body {
        min-height: 100vh;
        background-color: #F7F9FC;
        background-image: radial-gradient(#E2E8F0 2px, transparent 2px);
        background-size: 30px 30px;
        display: flex; flex-direction: column; align-items: center; padding: 40px 20px;
        font-family: 'Nunito', sans-serif;
        user-select: none;
    }

    /* 2. ENCABEZADO */
    .header-title {
        color: #374151; font-size: 3rem; font-weight: 900;
        text-align: center; margin-bottom: 5px; text-transform: uppercase;
        display: flex; align-items: center; justify-content: center; gap: 15px;
    }
    .header-subtitle {
        color: #9CA3AF; font-size: 1.5rem; font-weight: 700;
        text-align: center; margin-bottom: 30px;
    }
    .title-icon { width: 60px; height: 60px; filter: drop-shadow(0 6px 6px rgba(0,0,0,0.15)); }

    /* 3. PANELES DE HERRAMIENTAS (TOOLBARS) */
    .toolbar-panel {
        background: #FFFFFF; border-radius: 32px; padding: 25px 30px;
        box-shadow: 0 15px 30px rgba(0,0,0,0.05); border: 4px solid #FFFFFF;
        margin-bottom: 25px; width: 100%; max-width: 800px;
        display: flex; flex-direction: column; gap: 15px; align-items: center;
    }

    .toolbar-title {
        color: #1CB0F6; font-size: 1.2rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; margin: 0;
    }

    /* 4. BOTONES BLOCK-PUSH (GUÍAS Y LETRAS) */
    .guides-container {
        display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; width: 100%;
    }

    .btn-guia {
        background: #F1F5F9; color: #64748B;
        border: 2px solid #E2E8F0; border-bottom: 6px solid #CBD5E1;
        border-radius: 16px; padding: 12px 20px;
        font-family: 'Nunito', sans-serif; font-size: 1.2rem; font-weight: 900;
        cursor: pointer; transition: all 0.1s ease; outline: none;
    }

    /* Botones de letras redondos */
    .btn-guia.btn-round {
        width: 55px; height: 55px; padding: 0; border-radius: 50%;
        display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
    }

    .btn-guia:hover { transform: translateY(-2px); border-bottom-width: 8px; background: #E2E8F0; }
    
    /* Estado activo: Hundido y Verde Menta */
    .btn-guia.active {
        background: #D7FFB8 !important; color: #58CC02 !important;
        border-color: #58CC02 !important; border-bottom-color: #58CC02 !important;
        transform: translateY(4px); border-bottom-width: 2px; margin-bottom: 4px;
    }

    /* Separador visual */
    .divider { width: 4px; border-radius: 2px; background: #E2E8F0; margin: 0 5px; }

    /* 5. HERRAMIENTAS DE DIBUJO (COLORES Y GROSOR) */
    .tools-container {
        display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 30px; width: 100%;
    }

    .tool-group { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .tool-label { color: #9CA3AF; font-size: 1rem; font-weight: 900; text-transform: uppercase; }

    .colors-row { display: flex; gap: 12px; }

    .color-btn {
        width: 45px; height: 45px; border-radius: 50%; cursor: pointer;
        border: 4px solid #F1F5F9; box-shadow: 0 4px 0 rgba(0,0,0,0.1);
        transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); outline: none;
    }
    
    .color-btn:hover { transform: scale(1.1) translateY(-2px); }
    
    /* Estado activo del color: Crece y tiene borde resaltado */
    .color-btn.active {
        transform: scale(1.2) translateY(-2px);
        border-color: #FFFFFF; box-shadow: 0 8px 15px rgba(0,0,0,0.2), 0 0 0 4px #1CB0F6;
    }

    /* SLIDER PERSONALIZADO */
    .custom-slider {
        -webkit-appearance: none; width: 150px; height: 12px;
        background: #E2E8F0; border-radius: 10px; outline: none;
    }
    .custom-slider::-webkit-slider-thumb {
        -webkit-appearance: none; appearance: none;
        width: 28px; height: 28px; border-radius: 50%; background: #1CB0F6;
        cursor: pointer; border: 4px solid #FFFFFF; box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }

    /* BOTÓN REINICIAR (BLOCK-PUSH ROJO) */
    .btn-clear {
        background: #FF4B4B; color: white; border: none; border-bottom: 6px solid #EA2B2B;
        border-radius: 16px; padding: 12px 25px; font-size: 1.2rem; font-weight: 900;
        cursor: pointer; transition: all 0.1s; text-transform: uppercase;
        display: flex; align-items: center; gap: 8px;
    }
    .btn-clear:active { transform: translateY(6px); border-bottom-width: 0; margin-bottom: 6px; }

    /* 6. PIZARRA (CANVAS TABLET) */
    .canvas-wrapper {
        background: #FFFFFF; border-radius: 32px; padding: 15px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.1); border: 4px solid #E2E8F0;
        /* Fondo estilo cuaderno moderno */
        background-image: linear-gradient(#F1F5F9 2px, transparent 2px);
        background-size: 100% 40px;
        position: relative; overflow: hidden; margin-bottom: 40px;
    }

    #canvasPlanas {
        background: transparent; /* Deja ver el cuaderno de fondo */
        border-radius: 20px; cursor: crosshair; touch-action: none;
        display: block; width: 100%; max-width: 750px;
    }

    /* BOTÓN SECUNDARIO (VOLVER) */
    .btn-secondary {
        background: #FF4B4B; color: white; font-size: 1.5rem; font-weight: 900; text-transform: uppercase;
        padding: 15px 40px; border-radius: 16px; text-decoration: none; display: inline-block;
        border: none; border-bottom: 6px solid #EA2B2B; transition: all 0.1s;
    }
    .btn-secondary:active { transform: translateY(6px); border-bottom-width: 0; }

</style>

<div class="game-body">
    
    <div class="animate__animated animate__bounceInDown">
        <h1 class="header-title">
            <img src="https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Artist%20palette/3D/artist_palette_3d.png" class="title-icon" alt="Paleta">
            ¡A Dibujar!
        </h1>
        <p class="header-subtitle">Elige un modelo para calcar o dibuja libremente</p>
    </div>

    <div class="toolbar-panel">
        <p class="toolbar-title">🌟 Selecciona tu Guía</p>
        <div class="guides-container">
            <button class="btn-guia active" data-guia="libre">✨ Dibujo Libre</button>
            <div class="divider"></div>
            <button class="btn-guia btn-round" data-guia="A">A</button>
            <button class="btn-guia btn-round" data-guia="E">E</button>
            <button class="btn-guia btn-round" data-guia="I">I</button>
            <button class="btn-guia btn-round" data-guia="O">O</button>
            <button class="btn-guia btn-round" data-guia="U">U</button>
            <div class="divider"></div>
            <button class="btn-guia" data-guia="circulo">⭕ Círculo</button>
            <button class="btn-guia" data-guia="cuadrado">🔲 Cuadrado</button>
            <button class="btn-guia" data-guia="triangulo">🔺 Triángulo</button>
        </div>
    </div>

    <div class="toolbar-panel tools-container">
        <div class="tool-group">
            <span class="tool-label">Color</span>
            <div class="colors-row">
                <button class="color-btn active" data-color="#212529" style="background-color: #212529;"></button>
                <button class="color-btn" data-color="#1CB0F6" style="background-color: #1CB0F6;"></button> <button class="color-btn" data-color="#FF4B4B" style="background-color: #FF4B4B;"></button> <button class="color-btn" data-color="#58CC02" style="background-color: #58CC02;"></button> <button class="color-btn" data-color="#FFC800" style="background-color: #FFC800;"></button> </div>
        </div>

        <div class="divider" style="height: 40px; margin: 0 15px;"></div>

        <div class="tool-group">
            <span class="tool-label">Grosor</span>
            <input type="range" class="custom-slider" id="grosorPincel" min="4" max="25" value="8">
        </div>

        <div class="divider" style="height: 40px; margin: 0 15px;"></div>

        <div class="tool-group">
            <span class="tool-label">Limpiar</span>
            <button type="button" class="btn-clear" id="btnBorrar">
                🗑️ Reiniciar
            </button>
        </div>
    </div>

    <div class="canvas-wrapper">
        <canvas id="canvasPlanas" width="750" height="420"></canvas>
    </div>

    <div>
        <a href="{% url 'student_dashboard' %}" class="btn-secondary">Volver al Inicio</a>
    </div>

</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const canvas = document.getElementById('canvasPlanas');
        const ctx = canvas.getContext('2d');
        const btnBorrar = document.getElementById('btnBorrar');
        const grosorPincel = document.getElementById('grosorPincel');
        const botonesColor = document.querySelectorAll('.color-btn');
        const botonesGuia = document.querySelectorAll('.btn-guia');

        let dibujando = false;
        let colorActual = '#212529';
        let grosorActual = 8;
        let guiaActual = 'libre';

        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        // --- SISTEMA DE DIBUJO DE GUÍAS DE FONDO ---
        function cargarGuiaDeFondo() {
            if (guiaActual === 'libre') return;

            ctx.save();
            ctx.strokeStyle = '#CBD5E1'; // Gris azulado suave del sistema de diseño
            ctx.lineWidth = 6;
            ctx.setLineDash([12, 12]); // Línea punteada más espaciada y moderna
            ctx.fillStyle = '#F8FAFC';

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            if (['A', 'E', 'I', 'O', 'U'].includes(guiaActual)) {
                ctx.font = "900 280px 'Recursive', sans-serif";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillStyle = "rgba(203, 213, 225, 0.4)"; // Gris claro para la letra de fondo
                ctx.fillText(guiaActual, centerX, centerY + 20);
            } else if (guiaActual === 'circulo') {
                ctx.beginPath();
                ctx.arc(centerX, centerY, 120, 0, 2 * Math.PI);
                ctx.stroke();
            } else if (guiaActual === 'cuadrado') {
                ctx.strokeRect(centerX - 120, centerY - 120, 240, 240);
            } else if (guiaActual === 'triangulo') {
                ctx.beginPath();
                ctx.moveTo(centerX, centerY - 130);
                ctx.lineTo(centerX + 140, centerY + 120);
                ctx.lineTo(centerX - 140, centerY + 120);
                ctx.closePath();
                ctx.stroke();
            }
            ctx.restore();
        }

        // --- MANEJO DE TRAZOS ---
        function empezarDibujo(e) {
            dibujando = true;
            dibujar(e);
        }

        function terminarDibujo() {
            dibujando = false;
            ctx.beginPath();
        }

        function obtenerCoordenadas(e) {
            const rect = canvas.getBoundingClientRect();
            // Factores de escala por si la pantalla redimensiona el canvas por CSS
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        function dibujar(e) {
            if (!dibujando) return;
            if (e.touches) e.preventDefault(); // Evita scroll en móviles al dibujar

            const coords = obtenerCoordenadas(e);

            ctx.lineWidth = grosorActual;
            ctx.strokeStyle = colorActual;

            ctx.lineTo(coords.x, coords.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(coords.x, coords.y);
        }

        canvas.addEventListener('mousedown', empezarDibujo);
        canvas.addEventListener('mousemove', dibujar);
        canvas.addEventListener('mouseup', terminarDibujo);
        canvas.addEventListener('mouseleave', terminarDibujo);

        canvas.addEventListener('touchstart', empezarDibujo, {passive: false});
        canvas.addEventListener('touchmove', dibujar, {passive: false});
        canvas.addEventListener('touchend', terminarDibujo);

        // --- CONTROLADORES DE INTERFAZ ---
        grosorPincel.addEventListener('input', (e) => { grosorActual = e.target.value; });

        botonesColor.forEach(boton => {
            boton.addEventListener('click', () => {
                botonesColor.forEach(b => b.classList.remove('active'));
                colorActual = boton.getAttribute('data-color');
                boton.classList.add('active');
            });
        });

        botonesGuia.forEach(boton => {
            boton.addEventListener('click', () => {
                botonesGuia.forEach(b => b.classList.remove('active'));
                boton.classList.add('active');
                
                guiaActual = boton.getAttribute('data-guia');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                cargarGuiaDeFondo();
                
                // Efecto confeti leve al cambiar de nivel/guía
                if(guiaActual !== 'libre') {
                    confetti({ particleCount: 30, spread: 40, origin: { y: 0.9 } });
                }
            });
        });

        btnBorrar.addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            cargarGuiaDeFondo();
        });
    });
</script>
{% endblock %}
