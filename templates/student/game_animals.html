{% extends 'base.html' %}
{% load static %}

{% block content %}
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">

<style>
    /* 1. FONDO LIMPIO Y ENFOCADO */
    .game-body {
        min-height: 100vh;
        background-color: #F7F9FC;
        background-image: radial-gradient(#E2E8F0 2px, transparent 2px);
        background-size: 30px 30px;
        display: flex; flex-direction: column; align-items: center; padding: 40px 20px;
        font-family: 'Nunito', sans-serif;
        user-select: none; /* Evita que los niños seleccionen texto por error */
    }

    /* 2. BARRA DE PROGRESO UI MODERNA */
    .progress-wrapper {
        width: 100%; max-width: 600px;
        background: #E2E8F0;
        border-radius: 100px;
        height: 24px;
        margin-bottom: 40px;
        position: relative;
        overflow: hidden;
    }
    
    .progress-fill {
        height: 100%; width: 0%;
        background: #58CC02; /* Verde estándar de éxito */
        border-radius: 100px;
        transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
    }

    /* Brillo superior en la barra para efecto tubo 3D */
    .progress-fill::after {
        content: ''; position: absolute; top: 4px; left: 10px; right: 10px; height: 6px;
        background: rgba(255,255,255,0.4); border-radius: 10px;
    }

    /* 3. TARJETA DE PREGUNTA */
    .question-header {
        font-size: 2.5rem;
        font-weight: 900;
        color: #374151;
        margin-bottom: 40px;
        text-align: center;
    }

    #target-name {
        color: #1CB0F6; /* Azul brillante */
        text-transform: uppercase;
    }

    /* 4. BOTONERA 3D (PATRÓN BLOCK-PUSH) */
    .animal-grid {
        display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px;
        width: 100%; max-width: 600px;
    }

    .animal-btn {
        background: #FFFFFF;
        border: 2px solid #E5E7EB;
        border-bottom: 8px solid #E5E7EB;
        border-radius: 24px;
        padding: 30px 20px;
        cursor: pointer;
        display: flex; flex-direction: column; align-items: center;
        transition: all 0.1s ease;
        position: relative;
        outline: none;
    }

    /* Estados del botón */
    .animal-btn:hover {
        background: #F9FAFB;
        transform: translateY(-2px);
        border-bottom-width: 10px;
    }

    .animal-btn:active {
        transform: translateY(8px);
        border-bottom-width: 0px;
        margin-bottom: 8px; /* Compensa la pérdida del borde para no mover la grilla */
    }

    /* Imágenes 3D de alta calidad */
    .animal-3d-img {
        width: 110px;
        height: 110px;
        object-fit: contain;
        filter: drop-shadow(0 10px 10px rgba(0,0,0,0.15));
        margin-bottom: 15px;
        pointer-events: none; /* Evita arrastrar la imagen por error */
    }

    .animal-name {
        font-size: 1.8rem;
        font-weight: 900;
        color: #4B5563;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    /* Colores dinámicos para feedback */
    .btn-correct {
        border-color: #58CC02 !important; border-bottom-color: #58CC02 !important;
        background: #D7FFB8 !important;
    }
    .btn-wrong {
        border-color: #FF4B4B !important; border-bottom-color: #FF4B4B !important;
        background: #FFEDED !important;
    }

    /* 5. BOTÓN DE ACCIÓN SECUNDARIA (SALIR) */
    .btn-secondary {
        margin-top: 50px;
        background: #FF4B4B; color: white;
        font-size: 1.5rem; font-weight: 900; text-transform: uppercase;
        padding: 15px 40px; border-radius: 16px; text-decoration: none;
        border: none; border-bottom: 6px solid #EA2B2B;
        transition: all 0.1s;
    }
    .btn-secondary:active { transform: translateY(6px); border-bottom-width: 0; }

    /* 6. PANTALLA DE VICTORIA ESTÁNDAR */
    #victory-overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,0.6);
        display: none; align-items: center; justify-content: center; z-index: 100;
    }
    
    .victory-modal {
        background: white; width: 90%; max-width: 450px;
        border-radius: 32px; padding: 40px 20px;
        text-align: center; display: flex; flex-direction: column; align-items: center;
        animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes slideUp { 
        from { transform: translateY(100px); opacity: 0; } 
        to { transform: translateY(0); opacity: 1; } 
    }

    .victory-modal img { width: 150px; margin-bottom: 20px; }
    .victory-modal h1 { color: #FFC800; font-size: 3rem; font-weight: 900; margin: 0 0 30px 0; }

    .btn-primary {
        background: #1CB0F6; color: white; border: none; border-bottom: 6px solid #1899D6;
        border-radius: 16px; padding: 20px 0; width: 100%;
        font-size: 1.8rem; font-weight: 900; text-transform: uppercase; cursor: pointer;
    }
    .btn-primary:active { transform: translateY(6px); border-bottom-width: 0; margin-bottom: 6px; }

    /* Animación de error */
    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-10px) rotate(-2deg); }
        75% { transform: translateX(10px) rotate(2deg); }
    }
    .shake-anim { animation: shake 0.4s ease-in-out; }
</style>

<div class="game-body">
    <div class="progress-wrapper">
        <div class="progress-fill" id="game-progress"></div>
    </div>

    <div class="question-header">
        Encuentra el <br><span id="target-name">...</span>
    </div>

    <div class="animal-grid" id="animal-grid"></div>

    <div>
        <a href="{% url 'student_dashboard' %}" class="btn-secondary">Salir</a>
    </div>
</div>

<div id="victory-overlay">
    <div class="victory-modal">
        <img src="https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Trophy/3D/trophy_3d.png" alt="Trofeo">
        <h1>¡Genial!</h1>
        <button class="btn-primary" onclick="resetGame()">Continuar</button>
    </div>
</div>

<script>
    // ASSETS 3D: Rutas directas a los repositorios oficiales de Fluent UI 3D (Alta calidad asegurada)
    const animals = [
        { name: 'Perro', img: 'https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Dog%20face/3D/dog_face_3d.png' },
        { name: 'Gato', img: 'https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Cat%20face/3D/cat_face_3d.png' },
        { name: 'Conejo', img: 'https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Rabbit%20face/3D/rabbit_face_3d.png' },
        { name: 'León', img: 'https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Lion/3D/lion_3d.png' }
    ];

    let target = null;
    let score = 0;
    const goal = 5;

    function init() {
        const shuffled = [...animals].sort(() => 0.5 - Math.random());
        target = shuffled[Math.floor(Math.random() * shuffled.length)];
        document.getElementById('target-name').innerText = target.name;

        const grid = document.getElementById('animal-grid');
        grid.innerHTML = '';

        shuffled.forEach(a => {
            const btn = document.createElement('button');
            btn.className = 'animal-btn';
            
            // Inyección de la imagen 3D en lugar de emojis de texto
            btn.innerHTML = `
                <img src="${a.img}" alt="${a.name}" class="animal-3d-img">
                <span class="animal-name">${a.name}</span>
            `;
            
            btn.onclick = () => {
                // Prevenir múltiples clics
                if(btn.disabled) return;

                if(a.name === target.name) {
                    btn.classList.add('btn-correct');
                    score++;
                    updateProgress();
                    confetti({ particleCount: 60, spread: 70, origin: { y: 0.7 }, colors: ['#58CC02', '#1CB0F6', '#FFC800'] });
                    
                    // Deshabilitar botones momentáneamente
                    Array.from(grid.children).forEach(b => b.disabled = true);

                    if(score >= goal) {
                        setTimeout(showVictory, 600);
                    } else {
                        setTimeout(init, 800);
                    }
                } else {
                    btn.classList.add('btn-wrong');
                    btn.classList.add('shake-anim');
                    setTimeout(() => {
                        btn.classList.remove('shake-anim');
                        btn.classList.remove('btn-wrong');
                    }, 500);
                }
            };
            grid.appendChild(btn);
        });
    }

    function updateProgress() {
        document.getElementById('game-progress').style.width = (score / goal) * 100 + '%';
    }

    function showVictory() {
        document.getElementById('victory-overlay').style.display = 'flex';
        confetti({ particleCount: 300, spread: 120, zIndex: 200 });
    }

    function resetGame() {
        score = 0;
        updateProgress();
        document.getElementById('victory-overlay').style.display = 'none';
        init();
    }

    init();
</script>
{% endblock %}
