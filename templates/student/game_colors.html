{% extends 'base.html' %}
{% load static %}

{% block content %}
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght=700;900&display=swap" rel="stylesheet">

<style>
    /* 1. FONDO ESTANDARIZADO */
    .game-body {
        min-height: 100vh;
        background-color: #F7F9FC;
        background-image: radial-gradient(#E2E8F0 2px, transparent 2px);
        background-size: 30px 30px;
        display: flex; flex-direction: column; align-items: center; padding: 40px 20px;
        font-family: 'Nunito', sans-serif;
        user-select: none;
    }

    /* 2. BARRA DE PROGRESO UI MODERNA */
    .progress-wrapper {
        width: 100%; max-width: 600px;
        background: #E2E8F0; border-radius: 100px; height: 24px;
        margin-bottom: 40px; position: relative; overflow: hidden;
    }
    
    .progress-fill {
        height: 100%; width: 0%;
        background: #FFC800; /* Amarillo brillante para este juego */
        border-radius: 100px;
        transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
    }
    .progress-fill::after {
        content: ''; position: absolute; top: 4px; left: 10px; right: 10px; height: 6px;
        background: rgba(255,255,255,0.4); border-radius: 10px;
    }

    /* 3. TÍTULO E INSTRUCCIÓN */
    .instruction-bubble {
        background: #FFFFFF; padding: 20px 50px; border-radius: 32px;
        border: 4px solid #FFFFFF; box-shadow: 0 15px 25px rgba(0,0,0,0.05);
        margin-bottom: 40px; text-align: center; max-width: 600px; width: 100%;
    }
    
    .instruction-bubble h2 {
        margin: 0; font-size: 2.5rem; font-weight: 900; color: #4B5563;
        text-transform: uppercase; letter-spacing: 1px;
    }
    
    #target-text {
        font-size: 3rem; display: block; margin-top: 5px;
        text-shadow: 0 4px 0 rgba(0,0,0,0.05);
    }

    /* 4. GRID Y TARJETAS BLOCK-PUSH COLOREADAS */
    .color-grid {
        display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px;
        width: 100%; max-width: 500px;
    }

    .color-card {
        aspect-ratio: 1 / 1;
        border-radius: 32px; cursor: pointer;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        border: 2px solid transparent; border-bottom-width: 10px; border-bottom-style: solid;
        transition: all 0.1s ease; outline: none; position: relative; overflow: hidden;
    }

    /* Colores estandarizados del sistema */
    .card-rojo { background: #FF4B4B; border-bottom-color: #EA2B2B; }
    .card-azul { background: #1CB0F6; border-bottom-color: #1899D6; }
    .card-amarillo { background: #FFC800; border-bottom-color: #E5B400; }
    .card-verde { background: #58CC02; border-bottom-color: #46A302; }

    /* Brillo superior tipo plástico */
    .color-card::after {
        content: ''; position: absolute; top: 8px; left: 15px; right: 15px; height: 15px;
        background: rgba(255,255,255,0.3); border-radius: 20px; pointer-events: none;
    }

    .color-card:hover { transform: translateY(-4px); border-bottom-width: 12px; }
    .color-card:active { transform: translateY(8px); border-bottom-width: 0px; margin-bottom: 10px; }

    /* Círculo blanco detrás del asset para máximo contraste */
    .asset-bg-circle {
        background: rgba(255, 255, 255, 0.25); border-radius: 50%;
        width: 120px; height: 120px; display: flex; align-items: center; justify-content: center;
    }

    .asset-3d {
        width: 85px; height: 85px; object-fit: contain;
        filter: drop-shadow(0 10px 10px rgba(0,0,0,0.2)); pointer-events: none;
    }

    /* 5. MODAL DE VICTORIA ESTÁNDAR */
    #victory-modal {
        position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px);
        display: none; align-items: center; justify-content: center; z-index: 1000;
    }

    .victory-card {
        background: white; border-radius: 32px; padding: 40px; max-width: 450px; width: 90%;
        text-align: center; border: 4px solid #FFFFFF; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .btn-primary {
        background: #58CC02; color: white; border: none; border-bottom: 6px solid #46A302;
        border-radius: 16px; padding: 15px 0; width: 100%; margin-top: 20px;
        font-size: 1.6rem; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: all 0.1s;
    }
    .btn-primary:active { transform: translateY(6px); border-bottom-width: 0; margin-bottom: 6px; }

    /* BOTÓN SECUNDARIO */
    .btn-secondary {
        margin-top: 40px; background: #FF4B4B; color: white;
        font-size: 1.5rem; font-weight: 900; text-transform: uppercase;
        padding: 15px 40px; border-radius: 16px; text-decoration: none;
        border: none; border-bottom: 6px solid #EA2B2B; transition: all 0.1s; display: inline-block;
    }
    .btn-secondary:active { transform: translateY(6px); border-bottom-width: 0; }

    /* Animación de error */
    @keyframes shakeError {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-10px) rotate(-3deg); }
        75% { transform: translateX(10px) rotate(3deg); }
    }
</style>

<div class="game-body">
    <div class="progress-wrapper">
        <div class="progress-fill" id="game-progress"></div>
    </div>

    <div class="instruction-bubble animate__animated animate__bounceInDown">
        <h2>Toca el color:</h2>
        <span id="target-text">...</span>
    </div>

    <div class="color-grid" id="color-grid"></div>

    <div class="text-center mt-4">
        <a href="{% url 'student_dashboard' %}" class="btn-secondary">Volver al Inicio</a>
    </div>

    <div id="victory-modal">
        <div class="victory-card">
            <img src="https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Trophy/3D/trophy_3d.png" style="width:120px; margin-bottom:15px;" alt="Trofeo">
            <h1 style="font-size: 2.8rem; font-weight: 900; color: #FFC800; margin: 10px 0;">¡EXPERTO!</h1>
            <p style="font-size: 1.4rem; color: #64748B; font-weight: 700; margin-bottom: 20px;">Has identificado todos los colores perfectamente.</p>
            
            <button class="btn-primary" onclick="resetGame()">¡Jugar de nuevo! 🔄</button>
            
            <a href="{% url 'student_dashboard' %}" style="display: block; margin-top: 25px; color: #9CA3AF; font-weight: 900; text-transform: uppercase; text-decoration: none; font-size: 1.2rem;">Volver al panel</a>
        </div>
    </div>
</div>

<script>
    // Conectado directamente a los Assets 3D de Fluent UI
    const colorData = [
        { name: 'ROJO', class: 'card-rojo', hex: '#FF4B4B', img: 'https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Red%20heart/3D/red_heart_3d.png' },
        { name: 'AZUL', class: 'card-azul', hex: '#1CB0F6', img: 'https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Droplet/3D/droplet_3d.png' },
        { name: 'AMARILLO', class: 'card-amarillo', hex: '#FFC800', img: 'https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Star/3D/star_3d.png' },
        { name: 'VERDE', class: 'card-verde', hex: '#58CC02', img: 'https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Green%20apple/3D/green_apple_3d.png' }
    ];

    let target = null;
    let score = 0;
    const maxScore = 5;

    // =========================================================================
    // 🔊 MOTOR DE AUDIO SINTETIZADO (Efectos Arcade Variados)
    // =========================================================================
    let audioCtx = null;

    function iniciarAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    // Efecto de Acierto: Tono doble saltarín y alegre (Onda Triangle)
    function sonarCorrecto() {
        if (!audioCtx) return;
        const ahora = audioCtx.currentTime;

        const lanzarNota = (frecuencia, inicio, duracion) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'triangle'; 
            osc.frequency.setValueAtTime(frecuencia, inicio);
            
            gain.gain.setValueAtTime(0.4, inicio);
            gain.gain.exponentialRampToValueAtTime(0.001, inicio + duracion);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(inicio);
            osc.stop(inicio + duracion);
        };

        lanzarNota(587.33, ahora, 0.08);        // Nota Re5 (Rápida)
        lanzarNota(880.00, ahora + 0.07, 0.25); // Nota La5 (Destello de acierto)
    }

    // Efecto de Error: Caída de frecuencia grave sutil (Onda Sawtooth)
    function sonarIncorrecto() {
        if (!audioCtx) return;
        const ahora = audioCtx.currentTime;
        const duracion = 0.3;

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = 'sawtooth';
        // Comienza en 180Hz y baja rápidamente a 80Hz en rampa
        osc.frequency.setValueAtTime(180, ahora);
        osc.frequency.linearRampToValueAtTime(80, ahora + duracion);

        gain.gain.setValueAtTime(0.25, ahora);
        gain.gain.exponentialRampToValueAtTime(0.001, ahora + duracion);

        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(ahora);
        osc.stop(ahora + duracion);
    }
    // =========================================================================

    function renderGame() {
        // Seleccionamos un color objetivo aleatorio
        target = colorData[Math.floor(Math.random() * colorData.length)];
        
        const targetElement = document.getElementById('target-text');
        targetElement.innerText = target.name;
        targetElement.style.color = target.hex; // El texto cambia al color que hay que buscar

        const grid = document.getElementById('color-grid');
        grid.innerHTML = '';

        // Desordenar los botones para que no estén siempre en el mismo lugar
        const shuffledColors = [...colorData].sort(() => Math.random() - 0.5);

        shuffledColors.forEach(item => {
            const card = document.createElement('div');
            card.className = `color-card ${item.class}`;
            // Incorporamos el círculo semitransparente de fondo y la imagen 3D
            card.innerHTML = `
                <div class="asset-bg-circle">
                    <img src="${item.img}" class="asset-3d" draggable="false">
                </div>
            `;
            
            card.onclick = () => {
                iniciarAudio(); // Asegura el contexto activo tras interacción
                
                if(item.name === target.name) {
                    sonarCorrecto();
                    score++;
                    updateProgress();
                    confetti({ particleCount: 50, spread: 60, origin: { y: 0.8 }, colors: ['#58CC02', '#1CB0F6', '#FFC800', '#FF4B4B'] });
                    
                    if(score >= maxScore) {
                        setTimeout(showVictory, 400);
                    } else {
                        // Deshabilitamos la grilla temporalmente para evitar doble clic
                        grid.style.pointerEvents = 'none';
                        setTimeout(() => {
                            renderGame();
                            grid.style.pointerEvents = 'auto';
                        }, 800);
                    }
                } else {
                    sonarIncorrecto();
                    // Animación de error estandarizada
                    card.style.animation = 'none';
                    card.offsetHeight; // Reflow
                    card.style.animation = 'shakeError 0.4s ease-in-out';
                }
            };
            grid.appendChild(card);
        });
    }

    function updateProgress() {
        const percent = (score / maxScore) * 100;
        document.getElementById('game-progress').style.width = percent + '%';
    }

    function showVictory() {
        document.getElementById('victory-modal').style.display = 'flex';
        confetti({ particleCount: 250, spread: 120, origin: { y: 0.5 }, zIndex: 2000 });
    }

    function resetGame() {
        score = 0;
        updateProgress();
        document.getElementById('victory-modal').style.display = 'none';
        renderGame();
    }

    // Iniciar juego al cargar
    document.addEventListener('DOMContentLoaded', renderGame);
</script>
{% endblock %}
