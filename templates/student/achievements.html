{% extends 'base.html' %}
{% block content %}
<div class="container py-4">
  <h1 class="fw-bold mb-4">Mis logros</h1>
  <div class="row g-4">
    {% if logros %}
      {% for l in logros %}
      <div class="col-md-6 col-xl-4"><div class="panel-card h-100"><div class="d-flex align-items-center gap-3 mb-3"><div class="lesson-emoji small-emoji">⭐</div><div><h5 class="fw-bold mb-1">{{ l.nombre }}</h5><small class="text-secondary">{{ l.fecha_creacion }}</small></div></div><p class="text-secondary mb-0">{{ l.descripcion }}</p></div></div>
      {% endfor %}
    {% else %}
      <div class="col-12"><div class="panel-card">Aún no tienes logros.</div></div>
    {% endif %}
  </div>
</div>
{% endblock %}
