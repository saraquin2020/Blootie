{% extends 'base.html' %}
{% block content %}

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">

<style>
    /* 1. FONDO TEMÁTICO "MÚSICA" (Purple Blueprint) */
    .blootie-music-theme {
        background-color: #F5F3FF; 
        background-image: radial-gradient(#DDD6FE 2px, transparent 2px);
        background-size: 30px 30px;
        min-height: 100vh;
        font-family: 'Nunito', sans-serif;
        padding-bottom: 60px;
    }

    /* 2. CABECERA */
    .music-header {
        padding: 50px 20px 40px;
        text-align: center;
    }
    .b-title {
        color: #5B21B6;
        font-size: 3.2rem;
        font-weight: 900;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
        text-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }
    .b-subtitle {
        color: #7C3AED;
        font-size: 1.5rem;
        font-weight: 700;
    }

    /* 3. TARJETAS BLOCK-PUSH */
    .b-card-song {
        background: white;
        border-radius: 32px;
        padding: 20px;
        border: 2px solid #EDE9FE;
        border-bottom: 8px solid #DDD6FE;
        transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    .b-card-song:hover {
        transform: translateY(-6px);
        border-bottom-width: 12px;
        border-color: #C4B5FD;
        border-bottom-color: #A78BFA;
    }
    
    /* Contenedor de Miniatura de YouTube */
    .video-thumbnail-container {
        width: 100%;
        aspect-ratio: 16/9;
        border-radius: 20px;
        overflow: hidden;
        margin-bottom: 20px;
        border: 4px solid #F8FAFC;
        box-shadow: inset 0 4px 6px rgba(0,0,0,0.05);
        background: #000;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .video-thumbnail-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0.9;
        transition: transform 0.3s ease, opacity 0.3s ease;
    }
    .b-card-song:hover .video-thumbnail-img {
        transform: scale(1.05);
        opacity: 1;
    }
    /* Icono Play Superpuesto */
    .play-overlay {
        position: absolute;
        width: 50px;
        height: 50px;
        background: rgba(255, 255, 255, 0.9);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        transition: transform 0.2s;
        pointer-events: none;
    }
    .play-overlay::after {
        content: '';
        width: 0; 
        height: 0; 
        border-top: 10px solid transparent;
        border-bottom: 10px solid transparent;
        border-left: 16px solid #FF4B4B;
        margin-left: 4px;
    }
    .b-card-song:hover .play-overlay {
        transform: scale(1.15);
        background: #FF4B4B;
    }
    .b-card-song:hover .play-overlay::after {
        border-left-color: white;
    }

    .song-title {
        font-weight: 900;
        color: #334155;
        font-size: 1.25rem;
        margin-bottom: auto; /* Empuja el botón hacia abajo para alinear tarjetas */
        line-height: 1.3;
        padding-bottom: 15px;
        text-align: center;
    }

    /* 4. BOTONES GAMIFICADOS */
    .btn-b-pink {
        background: #FF66B2;
        color: white;
        font-size: 1.1rem;
        font-weight: 900;
        text-transform: uppercase;
        padding: 12px 30px;
        border-radius: 20px;
        text-decoration: none;
        border: none;
        border-bottom: 6px solid #D13B8A;
        transition: all 0.1s;
        display: inline-block;
        width: 100%;
        text-align: center;
    }
    .btn-b-pink:active { transform: translateY(6px); border-bottom-width: 0; }
    .btn-b-pink:hover { color: white; filter: brightness(1.05); }

    .btn-b-green {
        background: #58CC02;
        color: white;
        font-size: 1.3rem;
        font-weight: 900;
        text-transform: uppercase;
        padding: 15px 40px;
        border-radius: 24px;
        text-decoration: none;
        border: none;
        border-bottom: 6px solid #46A302;
        transition: all 0.1s;
        display: inline-flex;
        align-items: center;
        gap: 10px;
    }
    .btn-b-green:active { transform: translateY(6px); border-bottom-width: 0; }
    .btn-b-green:hover { color: white; filter: brightness(1.05); }

    /* Activos 3D */
    .asset-3d-title { width: 55px; height: 55px; object-fit: contain; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
</style>

<div class="blootie-music-theme">
    <!-- CABECERA -->
    <div class="music-header animate__animated animate__fadeInDown">
        <h1 class="b-title">
            Mis Canciones
            <img src="https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Musical%20notes/3D/musical_notes_3d.png" class="asset-3d-title" alt="Notas Musicales">
        </h1>
        <p class="b-subtitle">¡Elige tu canción favorita y empieza a bailar!</p>
    </div>

    <!-- CUADRÍCULA DE CANCIONES -->
    <div class="container">
        <div class="row g-4 justify-content-center">
            {% for cancion in canciones %}
            <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                <div class="b-card-song shadow-sm">
                    
                    <div class="video-thumbnail-container">
                        <!-- Lógica intacta: Extraemos el ID del video de YouTube -->
                        <img src="https://img.youtube.com/vi/{{ cancion.url|cut:'https://www.youtube.com/embed/' }}/0.jpg" class="video-thumbnail-img" alt="{{ cancion.title }}">
                        <div class="play-overlay"></div>
                    </div>
                    
                    <h5 class="song-title">{{ cancion.title }}</h5>
                    
                    <a href="{% url 'songs_detail' cancion.id %}" class="btn-b-pink">REPRODUCIR</a>
                </div>
            </div>
            {% empty %}
            <!-- ESTADO VACÍO (Buena Práctica de UX) -->
            <div class="col-12 text-center py-5">
                <div style="background: white; border: 4px dashed #C4B5FD; border-radius: 32px; padding: 40px; max-width: 600px; margin: 0 auto;">
                    <img src="https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Muted%20speaker/3D/muted_speaker_3d.png" style="width: 80px; margin-bottom: 15px;" alt="Silencio">
                    <h4 style="color: #5B21B6; font-weight: 900;">¡Qué silencio!</h4>
                    <p style="color: #7C3AED; font-weight: 700; margin: 0;">Aún no se han añadido canciones a tu lista.</p>
                </div>
            </div>
            {% endfor %}
        </div>

        <!-- BOTÓN DE SALIDA -->
        <div class="text-center mt-5 pt-4">
            <a href="{% url 'student_dashboard' %}" class="btn-b-green shadow-sm">
                🏠 Ir al Menú de Módulos
            </a>
        </div>
    </div>
</div>
{% endblock %}
