{% extends 'base.html' %}
{% load static %}

{% block content %}
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght=700;900&display=swap" rel="stylesheet">

<style>
    /* 1. FONDO ESTANDARIZADO DEL SISTEMA */
    body {
        background-color: #F7F9FC;
        background-image: radial-gradient(#E2E8F0 2px, transparent 2px);
        background-size: 30px 30px;
        font-family: 'Nunito', sans-serif;
        user-select: none;
        margin: 0; padding-bottom: 50px;
    }

    /* Ocultar el mono de base.html solo aquí */
    #blootie-world { display: none !important; }

    /* 2. ENCABEZADO */
    .header-title {
        color: #374151; font-size: 3rem; font-weight: 900;
        text-align: center; margin-top: 40px; margin-bottom: 10px; text-transform: uppercase;
    }
    .header-subtitle {
        color: #9CA3AF; font-size: 1.5rem; font-weight: 700;
        text-align: center; margin-bottom: 40px;
    }

    /* 3. TABLERO Y CARTAS (BLOCK-PUSH 3D FLIP) */
    #memory-board {
        perspective: 1200px;
        max-width: 600px;
        margin: 0 auto;
    }

    .memory-card {
        aspect-ratio: 1 / 1;
        cursor: pointer;
        position: relative;
    }

    /* Envoltura interna que hace el giro */
    .card-inner {
        position: relative;
        width: 100%; height: 100%;
        transform-style: preserve-3d;
        transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .memory-card.flipped .card-inner {
        transform: rotateY(180deg);
    }

    /* Caras comunes (Estilo Ficha Gruesa) */
    .card-face {
        position: absolute; inset: 0;
        backface-visibility: hidden;
        border-radius: 24px;
        display: flex; align-items: center; justify-content: center;
        border: 2px solid #E5E7EB;
        border-bottom: 10px solid #E5E7EB; /* Efecto grosor 3D */
        transition: all 0.1s ease;
    }

    .memory-card:active .card-face {
        transform: translateY(6px);
        border-bottom-width: 4px;
    }

    /* Parte trasera (La de incógnito) */
    .card-back {
        background: #1CB0F6;
        border-color: #1899D6;
        border-bottom-color: #1580B4;
    }
    
    /* El signo de interrogación */
    .card-back::after {
        content: '?';
        color: white; font-size: 4rem; font-weight: 900;
        filter: drop-shadow(0 4px 4px rgba(0,0,0,0.1));
    }

    /* Parte delantera (El Asset 3D) */
    .card-front {
        background: white;
        transform: rotateY(180deg);
    }

    .asset-3d {
        width: 65%; height: 65%; object-fit: contain;
        filter: drop-shadow(0 8px 8px rgba(0,0,0,0.15));
        pointer-events: none;
    }

    /* Estado cuando se encuentra el par correcto */
    .memory-card.matched .card-front {
        background: #D7FFB8;
        border-color: #58CC02;
        border-bottom-color: #46A302;
    }

    /* 4. FORMULARIO DE VICTORIA ESTANDARIZADO */
    #win-form-container {
        background: white;
        border-radius: 32px; padding: 40px; max-width: 500px; margin: 50px auto 0;
        text-align: center; border: 4px solid #FFFFFF;
        box-shadow: 0 20px 40px rgba(0,0,0,0.05);
    }

    .victory-title { color: #FFC800; font-size: 2.5rem; font-weight: 900; margin-bottom: 10px; }
    .victory-subtitle { color: #64748B; font-size: 1.4rem; font-weight: 700; margin-bottom: 30px; }

    .btn-primary {
        background: #58CC02; color: white; border: none; border-bottom: 6px solid #46A302;
        border-radius: 16px; padding: 15px 40px; width: 100%;
        font-size: 1.6rem; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: all 0.1s;
    }
    .btn-primary:active { transform: translateY(6px); border-bottom-width: 0; margin-bottom: 6px; }

    /* BOTÓN SECUNDARIO (VOLVER) */
    .btn-secondary {
        margin-top: 40px; background: #FF4B4B; color: white;
        font-size: 1.5rem; font-weight: 900; text-transform: uppercase;
        padding: 15px 40px; border-radius: 16px; text-decoration: none;
        border: none; border-bottom: 6px solid #EA2B2B; transition: all 0.1s; display: inline-block;
    }
    .btn-secondary:active { transform: translateY(6px); border-bottom-width: 0; }

    /* 5. FEEDBACK BLOOTIE */
    #blootie-feedback {
        position: fixed; bottom: 20px; right: 30px; width: 140px; z-index: 100; pointer-events: none;
    }
    #blootie-feedback img { width: 100%; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2)); }
    
    #blootie-msg {
        position: fixed; bottom: 160px; right: 40px; background: #1CB0F6; color: white;
        padding: 15px 25px; border-radius: 24px; font-size: 1.4rem; font-weight: 900;
        opacity: 0; transform: translateY(20px); transition: all 0.3s ease; z-index: 101;
        box-shadow: 0 8px 0 #1899D6;
    }
    #blootie-msg.show { opacity: 1; transform: translateY(0); }

    .jump { animation: jumpAnim 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes jumpAnim {
        0%, 100% { transform: translateY(0) scale(1); }
        50% { transform: translateY(-40px) scale(1.1); }
    }
</style>

<div class="header-title animate__animated animate__bounceInDown">🧠 ¡Juego de Memoria!</div>
<div class="header-subtitle">¡Encuentra las parejas!</div>

<div class="container pb-5">
    <div id="memory-board" class="row g-4 justify-content-center mx-auto"></div>

    <div id="win-form-container" style="display:none;" class="animate__animated animate__zoomIn">
        <img src="https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Trophy/3D/trophy_3d.png" style="width:100px; margin-bottom:15px;" alt="Trofeo">
        <form method="POST" id="win-form">
            {% csrf_token %}
            <input type="hidden" name="activity" value="memoria">
            
            <h2 class="victory-title">¡FANTÁSTICO!</h2>
            <p class="victory-subtitle">Encontraste todas las parejas.</p>
            <button type="submit" class="btn-primary">
                Registrar mis puntos ✨
            </button>
        </form>
    </div>

    <div class="text-center">
        <a href="{% url 'student_dashboard' %}" class="btn-secondary">Volver al Inicio</a>
    </div>
</div>

<div id="blootie-msg">¡Excelente!</div>
<div id="blootie-feedback">
    <img src="{% static 'img/logo_blootie.png' %}" alt="Blootie">
</div>

<script>
    const board = document.getElementById('memory-board');
    const blootie = document.getElementById('blootie-feedback');
    const blootieMsg = document.getElementById('blootie-msg');
    
    const memoryAssets = [
        { id: 'perro', img: 'https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Dog%20face/3D/dog_face_3d.png' },
        { id: 'manzana', img: 'https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Red%20apple/3D/red_apple_3d.png' },
        { id: 'arcoiris', img: 'https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Rainbow/3D/rainbow_3d.png' }
    ]; 
    
    let cardsData = [...memoryAssets, ...memoryAssets].sort(() => Math.random() - 0.5);
    
    let selectedCards = [];
    let matchedPairs = 0;
    let lockBoard = false;
    let audioCtx = null;

    function iniciarAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function sonarDestapeCarta() {
        if (!audioCtx) return;
        const ahora = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = 'triangle';
        osc.frequency.setValueAtTime(600, ahora);
        osc.frequency.exponentialRampToValueAtTime(150, ahora + 0.12);

        gain.gain.setValueAtTime(0.9, ahora);
        gain.gain.exponentialRampToValueAtTime(0.001, ahora + 0.12);

        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(ahora);
        osc.stop(ahora + 0.12);
    }

    function sonarParCorrecto() {
        if (!audioCtx) return;
        const ahora = audioCtx.currentTime;
        
        const crearNota = (frecuencia, inicio, duracion) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'square';
            osc.frequency.setValueAtTime(frecuencia, inicio);
            
            gain.gain.setValueAtTime(0.5, inicio);
            gain.gain.exponentialRampToValueAtTime(0.001, inicio + duracion);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(inicio);
            osc.stop(inicio + duracion);
        };

        crearNota(523.25, ahora, 0.15); 
        crearNota(783.99, ahora + 0.12, 0.35); 
    }

    function sonarErrorFallo() {
        if (!audioCtx) return;
        const ahora = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = 'sawtooth'; 
        osc.frequency.setValueAtTime(160, ahora);
        osc.frequency.linearRampToValueAtTime(90, ahora + 0.35);

        gain.gain.setValueAtTime(0.8, ahora);
        gain.gain.exponentialRampToValueAtTime(0.001, ahora + 0.35);

        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(ahora);
        osc.stop(ahora + 0.35);
    }

    cardsData.forEach((asset, index) => {
        const col = document.createElement('div');
        col.className = 'col-4 col-md-4'; 
        
        col.innerHTML = `
            <div class="memory-card" data-id="${asset.id}" id="card-${index}" onclick="flipCard(this)">
                <div class="card-inner">
                    <div class="card-face card-back"></div>
                    <div class="card-face card-front">
                        <img src="${asset.img}" class="asset-3d">
                    </div>
                </div>
            </div>
        `;
        board.appendChild(col);
    });

    function flipCard(cardElement) {
        iniciarAudio();

        if (lockBoard || cardElement.classList.contains('flipped') || selectedCards.includes(cardElement)) return;

        sonarDestapeCarta(); 
        cardElement.classList.add('flipped');
        selectedCards.push(cardElement);

        if (selectedCards.length === 2) {
            checkMatch();
        }
    }

    function checkMatch() {
        lockBoard = true;
        const [card1, card2] = selectedCards;
        const isMatch = card1.dataset.id === card2.dataset.id;

        if (isMatch) {
            matchedPairs++;
            setTimeout(() => {
                sonarParCorrecto();
                triggerBlootie(true);
            }, 150);
            
            setTimeout(() => {
                card1.classList.add('matched');
                card2.classList.add('matched');
            }, 300);

            selectedCards = [];
            lockBoard = false;
            
            if (matchedPairs === memoryAssets.length) {
                setTimeout(showVictory, 800);
            }
        } else {
            setTimeout(() => {
                sonarErrorFallo();
                card1.classList.remove('flipped');
                card2.classList.remove('flipped');
                selectedCards = [];
                lockBoard = false;
            }, 1000);
        }
    }

    function triggerBlootie(success) {
        if (success) {
            blootie.classList.add('jump');
            blootieMsg.classList.add('show');
            setTimeout(() => {
                blootie.classList.remove('jump');
                blootieMsg.classList.remove('show');
            }, 1500);
        }
    }

    function showVictory() {
        document.getElementById('win-form-container').style.display = 'block';
        confetti({
            particleCount: 200,
            spread: 90,
            origin: { y: 0.6 },
            colors: ['#58CC02', '#1CB0F6', '#FFC800']
        });
    }
</script>
{% endblock %}
