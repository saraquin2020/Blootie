{% extends 'base.html' %}
{% block content %}
<div class="container py-4"><h1 class="fw-bold mb-4">Actividades registradas</h1><div class="row g-4">{% for a in actividades %}<div class="col-md-6 col-xl-4"><div class="panel-card h-100"><span class="badge rounded-pill text-bg-light border mb-3">{{ a.get_tipo_display }}</span><h5 class="fw-bold">{{ a.titulo }}</h5><p class="text-secondary mb-0">{{ a.descripcion }}</p></div></div>{% endfor %}</div></div>
{% endblock %}
